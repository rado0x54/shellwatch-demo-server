# SPDX-License-Identifier: MIT
name: Release

# Workflow_dispatch with a version input is the only release path. The
# workflow validates the version, builds and pushes the image, then tags
# the commit and creates the GitHub Release. Tagging/release-creation
# happen at the end so failed builds don't leave orphan tags.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.1.0 — no v prefix)"
        required: true
        type: string

permissions:
  contents: write
  packages: write

concurrency:
  group: release-singleton
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/shellwatch-demo-server

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Validate dispatch ref & version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "::error::This workflow must be dispatched from main (got ${GITHUB_REF})"
            exit 1
          fi

          VERSION="${{ inputs.version }}"
          VERSION="${VERSION#v}"

          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version: ${VERSION} (must be MAJOR.MINOR.PATCH)"
            exit 1
          fi

          PREV_TAG=$(git tag --list 'v*' --sort=-v:refname | head -1 || true)
          if [ -n "$PREV_TAG" ]; then
            CURRENT="${PREV_TAG#v}"
            if ! dpkg --compare-versions "$VERSION" gt "$CURRENT"; then
              echo "::error::Version ${VERSION} must be greater than latest tag ${PREV_TAG}"
              exit 1
            fi
          fi

          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "::error::Tag v${VERSION} already exists"
            exit 1
          fi

          if gh release view "v${VERSION}" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "::error::Release v${VERSION} already exists"
            exit 1
          fi

          SHA_SHORT=$(git rev-parse --short HEAD)

          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "TAG=v${VERSION}" >> "$GITHUB_ENV"
          echo "PREV_TAG=${PREV_TAG}" >> "$GITHUB_ENV"
          echo "SHA_SHORT=${SHA_SHORT}" >> "$GITHUB_ENV"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          provenance: false
          tags: |
            ${{ env.IMAGE }}:${{ env.TAG }}
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:sha-${{ env.SHA_SHORT }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Tag commit & push tag
        run: |
          set -euo pipefail
          # Only tag after image push succeeds — no orphan tags.
          git tag "${TAG}" HEAD
          git push origin "refs/tags/${TAG}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          PAYLOAD=$(jq -n \
            --arg tag "${TAG}" \
            --arg target "main" \
            --arg prev "${PREV_TAG}" \
            'if $prev == "" then {tag_name:$tag, target_commitish:$target}
             else {tag_name:$tag, target_commitish:$target, previous_tag_name:$prev} end')

          BODY=$(echo "$PAYLOAD" | gh api -X POST "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            --input - --jq .body)

          # Normalize bullets to "- " for consistency with conventional changelog style
          BODY=$(echo "$BODY" | sed -E 's|^[*+] +|- |')

          printf '%s\n' "$BODY" > /tmp/release-body.md

          gh release create "${TAG}" \
            --title "${TAG}" \
            --notes-file /tmp/release-body.md
