# SPDX-License-Identifier: MIT
# Standalone compose for local development and smoke-testing the demo SSH
# server. Drop your pubkey into ./authorized_keys (gitignored) before
# bringing this up — every demo principal here points at the same file,
# so the same key works for all three. Production deployments use one
# file per principal via ShellWatch's authorizedKeyFile delivery; see the
# compose snippet in README.md.

services:
  shellwatch-demo:
    build: .
    # To run the published image instead of building locally, comment
    # `build: .` above and uncomment:
    # image: ghcr.io/rado0x54/shellwatch-demo-server:latest
    container_name: shellwatch-demo
    ports:
      - "2222:22"
    volumes:
      - ./authorized_keys:/var/lib/demo/keys/sw-snake:ro
      - ./authorized_keys:/var/lib/demo/keys/sw-matrix:ro
      - ./authorized_keys:/var/lib/demo/keys/sw-sudoku:ro
      - ./authorized_keys:/var/lib/demo/keys/sw-2048:ro
      # Only host keys persist — /etc/ssh stays in the image so sshd_config
      # changes always take effect on rebuild.
      - shellwatch-demo-host-keys:/var/lib/demo/host-keys
    # environment:
    #   SSHD_LOG_LEVEL: VERBOSE   # default INFO; VERBOSE logs key fingerprints
    #   # Pick one of the three key-delivery modes (see README "Key delivery"):
    #   #
    #   # 1. Blanket-approve: any keypair authenticates. Handshake still
    #   #    challenges and verifies the signature; the server just doesn't
    #   #    gate on which key was used. Removes the bind-mount above.
    #   AUTH_KEYS_ANY: "true"
    #   #
    #   # 2. Endpoint: GET the URL with ?user=&type=&fingerprint= per offered key.
    #   AUTH_KEYS_URL: "http://shellwatch:8080/demo/authorized-keys"
    #   AUTH_KEYS_TIMEOUT: "2"   # seconds, default 2
    #
    # File mode (the default for this compose file) needs neither var set
    # and keeps the bind mount above.
    restart: unless-stopped
    mem_limit: 256m
    pids_limit: 200

volumes:
  shellwatch-demo-host-keys: